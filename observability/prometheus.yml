# Prometheus scrape config for the Aegis platform.
# The three Spring services run on the host (via `mvn spring-boot:run`), so we scrape
# them through Docker Desktop's host gateway alias `host.docker.internal`.
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: aegis-auth-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:9000"]
        labels: { application: aegis-auth-server }

  - job_name: aegis-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { application: aegis-gateway }

  - job_name: aegis-resource-demo
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { application: aegis-resource-demo }
