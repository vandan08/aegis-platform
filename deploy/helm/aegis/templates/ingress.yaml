{{- if .Values.ingress.enabled }}
# Only the gateway is exposed to the outside world — the zero-trust entry point.
# The auth server and resource service stay cluster-internal (ClusterIP Services).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-gateway
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-gateway
                port:
                  number: {{ .Values.gateway.port }}
{{- end }}
