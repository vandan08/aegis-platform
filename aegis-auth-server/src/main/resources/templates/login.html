<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Aegis — Sign in</title>
    <link rel="stylesheet" th:href="@{/css/aegis.css}"/>
</head>
<body class="split">

<aside th:replace="~{fragments/ui :: brand}"></aside>

<main class="auth">
    <div class="card">
        <div th:replace="~{fragments/ui :: mini-logo}"></div>

        <h1>Sign in</h1>
        <p class="sub">Continue to the Aegis identity platform</p>

        <div class="msg error" th:if="${param.error}" role="alert">Invalid credentials or one-time code.</div>
        <div class="msg ok" th:if="${param.logout}" role="status">You have been signed out.</div>
        <div class="msg ok" th:if="${param.registered}" role="status">Account created — sign in to continue.</div>

        <form method="post" th:action="@{/login}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" autofocus required/>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required/>

            <label for="otp">One-time code</label>
            <input type="text" id="otp" name="otp" inputmode="numeric" pattern="[0-9]*"
                   maxlength="6" autocomplete="one-time-code" placeholder="123456"/>
            <div class="hint">Only required if MFA is enabled on your account.</div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-block">Sign in securely</button>
        </form>

        <p class="switch">New here? <a th:href="@{/register}">Create an account</a></p>

        <!-- Demo hint for reviewers — remove outside local dev (docs/ROADMAP.md). -->
        <div class="dev">
            <span class="pill">DEV</span>Demo account: <code>admin</code> / <code>changeit</code>.
        </div>
    </div>
</main>

</body>
</html>
